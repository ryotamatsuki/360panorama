<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>戦国の湯築城を歩く | 道後公園 時空360</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="vendor/pannellum/pannellum.css" />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow">道後公園 時空360</p>
          <h1 id="tourTitle">戦国の湯築城を歩く</h1>
        </div>
        <div class="header-meta">
          <span id="routeProgress">1 / 24</span>
          <span>簡易ストリートビュー型ウォークスルー</span>
        </div>
      </header>

      <main class="tour-layout">
        <section class="viewer-section" aria-label="360度ウォークスルー">
          <div id="panorama" class="viewer-canvas"></div>
          <div id="viewerFallback" class="viewer-fallback" hidden>
            <strong>Pannellumを読み込めませんでした。</strong>
            <span>vendor/pannellum の静的ファイルを確認してから再読み込みしてください。</span>
          </div>
          <p class="control-guide" aria-label="操作ガイド">
            <span class="guide-desktop">ドラッグで見回す ／ 矢印で移動 ／ W・Sで前後移動</span>
            <span class="guide-mobile">ドラッグで見回す・矢印で移動</span>
          </p>
          <div class="viewer-toolbar" aria-label="viewer controls">
            <button id="homeBtn" class="icon-button" type="button" title="最初の地点へ戻る">
              Home
            </button>
            <button id="autoRotateBtn" class="icon-button" type="button" aria-pressed="false">
              自動回転
            </button>
            <button id="fullscreenBtn" class="icon-button" type="button">
              全画面
            </button>
          </div>
        </section>

        <aside class="info-panel" aria-label="現在地情報">
          <section class="location-card">
            <p class="eyebrow" id="nodeZone">outer_castle</p>
            <h2 id="nodeTitle">N001 外堀入口</h2>
            <p class="subtitle" id="nodeSubtitle">湯築城へ入る起点</p>
            <p id="nodeDescription"></p>
            <p class="status-line" id="nodeStatus"></p>
          </section>

          <nav class="route-actions" aria-label="地点移動">
            <button id="prevBtn" type="button">前へ</button>
            <button id="nextBtn" type="button">次へ</button>
          </nav>

          <section class="node-list-section">
            <div class="section-heading">
              <h2>地点一覧</h2>
              <span id="nodeCount">24地点</span>
            </div>
            <div id="nodeList" class="node-list"></div>
          </section>

          <section class="route-map" aria-label="簡易ルート">
            <div id="miniMap" class="mini-map"></div>
          </section>

          <p class="disclaimer" id="disclaimer"></p>
          <p id="errorBox" class="error-box" role="alert" hidden></p>
        </aside>
      </main>
    </div>

    <script src="vendor/pannellum/pannellum.js"></script>
    <script src="src/tour-data.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
